<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Xavier Barber Club</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <img src="imagens/logo-xavier.png" alt="logo">
        </div>
        <div class="bloqueio">
                <h2>ACESSO RESTRITO</h2>
        </div>
        <div class="entre">
                <p>Entre com sua senha de administrador</p>
        </div>
        <div class="senha">
            <p>Senha:</p>
        </div>
        <input class="barra" type="email" placeholder="Digite seu email">
        <input class="barra"type="password" placeholder="Digite sua senha">
        <button class="entrar">ENTRAR</button>
    </div>

</body>
</html>
